<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyCampus Cafe Menu System</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .menu-card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        form { margin-bottom: 20px; padding: 15px; border: 1px dashed #666; }
        input, select, button { margin: 5px; padding: 8px; }
    </style>
</head>
<body>
    <div id="app">
        <header style="padding: 15px; background: #f4f4f4; margin-bottom: 20px;">
            <h1 style="margin:0;">MyCampus Cafe</h1>
            <nav style="margin-top: 10px;">
                <router-link to="/" style="margin-right: 15px;">Public Menu</router-link>
                
                <router-link v-if="isLoggedIn" to="/admin" style="margin-right: 15px; font-weight: bold; color: green;">Admin Dashboard</router-link>
                <router-link v-else to="/login" style="margin-right: 15px;">Staff Login</router-link>
                
                <button v-if="isLoggedIn" @click="logoutStaff" style="color: red; cursor: pointer;">Logout</button>
            </nav>
        </header>

        <main>
            <router-view></router-view>
        </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="js/api.js"></script>

    <script src="components/MenuPage.js"></script>
    <script src="components/LoginPage.js"></script>
    <script src="components/AdminMenuPage.js"></script>

    <script src="js/router.js"></script> 
    <script src="js/app.js"></script>
</body>
</html>
